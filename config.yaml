# ============================================================
# SHORTS BOT - CONFIG FILE
# Fill in your details below. No coding needed!
# Lines starting with # are just instructions, ignore them.
# ============================================================


# ------------------------------------------------------------
# BOT 1 - SOURCE CHANNELS
# These are the channels you have permission to pull Shorts from
# Add the channel ID (found in the channel URL)
# ------------------------------------------------------------
source_channels:
  - id: "UCxxxxxxxxxxxxxxxxxx1"   # Channel 1 - replace with real ID
    name: "Channel One"           # Just a label for you
  - id: "UCxxxxxxxxxxxxxxxxxx2"   # Channel 2 - replace with real ID
    name: "Channel Two"
  - id: "UCxxxxxxxxxxxxxxxxxx3"   # Channel 3 - replace with real ID
    name: "Channel Three"

# How many Shorts to pull per day from ALL source channels combined
shorts_per_day: 2


# ------------------------------------------------------------
# YOUR MAIN YOUTUBE CHANNEL
# Bot 1 uploads here first, then Bot 2 reposts from here
# ------------------------------------------------------------
main_channel:
  channel_id: "UCxxxxxxxxxxxxxxxxxx_MAIN"  # Your main channel ID
  client_id: "YOUR_MAIN_CLIENT_ID"
  client_secret: "YOUR_MAIN_CLIENT_SECRET"
  refresh_token: "YOUR_MAIN_REFRESH_TOKEN"


# ------------------------------------------------------------
# BOT 2 - DESTINATION YOUTUBE ACCOUNTS
# These are the 5 accounts the bot reposts to
# ------------------------------------------------------------
youtube_accounts:
  - name: "YT Account 1"
    channel_id: "UCxxxxxxxxxxxxxxxxxx_YT1"
    client_id: "YOUR_YT1_CLIENT_ID"
    client_secret: "YOUR_YT1_CLIENT_SECRET"
    refresh_token: "YOUR_YT1_REFRESH_TOKEN"
    shorts_per_day: 2

  - name: "YT Account 2"
    channel_id: "UCxxxxxxxxxxxxxxxxxx_YT2"
    client_id: "YOUR_YT2_CLIENT_ID"
    client_secret: "YOUR_YT2_CLIENT_SECRET"
    refresh_token: "YOUR_YT2_REFRESH_TOKEN"
    shorts_per_day: 2

  - name: "YT Account 3"
    channel_id: "UCxxxxxxxxxxxxxxxxxx_YT3"
    client_id: "YOUR_YT3_CLIENT_ID"
    client_secret: "YOUR_YT3_CLIENT_SECRET"
    refresh_token: "YOUR_YT3_REFRESH_TOKEN"
    shorts_per_day: 2

  - name: "YT Account 4"
    channel_id: "UCxxxxxxxxxxxxxxxxxx_YT4"
    client_id: "YOUR_YT4_CLIENT_ID"
    client_secret: "YOUR_YT4_CLIENT_SECRET"
    refresh_token: "YOUR_YT4_REFRESH_TOKEN"
    shorts_per_day: 2

  - name: "YT Account 5"
    channel_id: "UCxxxxxxxxxxxxxxxxxx_YT5"
    client_id: "YOUR_YT5_CLIENT_ID"
    client_secret: "YOUR_YT5_CLIENT_SECRET"
    refresh_token: "YOUR_YT5_REFRESH_TOKEN"
    shorts_per_day: 2


# ------------------------------------------------------------
# BOT 2 - DESTINATION INSTAGRAM ACCOUNTS
# These are the 5 Instagram accounts the bot reposts Reels to
# ------------------------------------------------------------
instagram_accounts:
  - name: "IG Account 1"
    username: "your_ig_username_1"
    password: "your_ig_password_1"
    reels_per_day: 2

  - name: "IG Account 2"
    username: "your_ig_username_2"
    password: "your_ig_password_2"
    reels_per_day: 2

  - name: "IG Account 3"
    username: "your_ig_username_3"
    password: "your_ig_password_3"
    reels_per_day: 2

  - name: "IG Account 4"
    username: "your_ig_username_4"
    password: "your_ig_password_4"
    reels_per_day: 2

  - name: "IG Account 5"
    username: "your_ig_username_5"
    password: "your_ig_password_5"
    reels_per_day: 2


# ------------------------------------------------------------
# SCHEDULE SETTINGS
# ------------------------------------------------------------
# How often GitHub Actions checks for new Shorts (in hours)
check_interval_hours: 12

# Add a delay between uploads to avoid getting flagged (in seconds)
upload_delay_seconds: 30
